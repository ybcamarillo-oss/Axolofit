    return () => window.removeEventListener("beforeinstallprompt", handler);

      const { error: e } = await sb.auth.signInWithOtp({ email, options: { shouldCreateUser: false } });

      setResetEnviado(true);
    } catch (e) {
      setError(e.message);
    }
    setCargando(false);
  };

  const handleVerifyOtp = async () => {
    setCargando(true); setOtpError(null);
    try {
      const { error: e } = await sb.auth.verifyOtp({ email, token: otpCode.trim(), type: "email" });
      if (e) throw e;
      setOtpVerificado(true);
    } catch (e) {
      setOtpError("Código incorrecto o expirado. Intenta de nuevo.");
    }
    setCargando(false);
  };

  const handleNuevaPass = async () => {
    setError(null);
    if (!pass || pass.length < 6) { setError("Mínimo 6 caracteres."); return; }
    setCargando(true);
    try {
      const { error: e } = await sb.auth.updateUser({ password: pass });
      if (e) throw e;
      setModo("login"); setResetEnviado(false); setOtpVerificado(false); setOtpCode(""); setPass("");
      setError(null);
      showToast && showToast("¡Contraseña actualizada! Ya puedes iniciar sesión 🔐");

      setError(e.message);
    }
    setCargando(false);

          {resetEnviado && otpVerificado && (<>
            {passInputJSX}

            <button className="btn primary big" onClick={handleNuevaPass} disabled={cargando}>

function computeProfile(p) {
  const { sexo, edad, pesoKg, estaturaCm, actividad, cuelloCm, cinturaCm, caderaCm, muñecaCm, objetivo } = p;
  const h = estaturaCm / 100;
  const imc = pesoKg / (h * h);
  const base = 10 * pesoKg + 6.25 * estaturaCm - 5 * edad;
  const bmr = sexo === "M" ? base + 5 : sexo === "F" ? base - 161 : base - 78;
  const factores = { sedentario: 1.2, ligero: 1.375, moderado: 1.55, activo: 1.725, intenso: 1.9 };
  const tdee = bmr * (factores[actividad] || 1.375);

  // % Grasa US Navy
  let bf = null;
  try {
    if (sexo === "M" && cinturaCm && cuelloCm && cinturaCm > cuelloCm) bf = 495 / (1.0324 - 0.19077 * Math.log10(cinturaCm - cuelloCm) + 0.15456 * Math.log10(estaturaCm)) - 450;
    else if (sexo === "F" && cinturaCm && cuelloCm && caderaCm && (cinturaCm + caderaCm) > cuelloCm) bf = 495 / (1.29579 - 0.35004 * Math.log10(cinturaCm + caderaCm - cuelloCm) + 0.22100 * Math.log10(estaturaCm)) - 450;
  } catch (e) {}
  if (bf != null && !isFinite(bf)) bf = null;
  if (bf != null) bf = Math.max(3, Math.min(60, bf));
  const masaMagra = bf != null ? pesoKg * (1 - bf / 100) : null;

  // Estructura ósea (frame size) — estatura / circunferencia muñeca
  let frameSize = null, pesoIdeal = null;
  if (muñecaCm && muñecaCm > 0) {
    const r = estaturaCm / muñecaCm;
    if (sexo === "F")      frameSize = r > 11   ? "pequeña" : r >= 10.1 ? "mediana" : "grande";
    else if (sexo === "M") frameSize = r > 10.4 ? "pequeña" : r >= 9.6  ? "mediana" : "grande";
    else                   frameSize = r > 10.7 ? "pequeña" : r >= 9.85 ? "mediana" : "grande";
    // Peso ideal Hamwi ajustado por estructura
    const inchesOver5ft = Math.max(0, (estaturaCm - 152.4) / 2.54);
    let piw = sexo === "M" ? 48.1 + 2.7 * inchesOver5ft : 45.5 + 2.3 * inchesOver5ft;
    if (frameSize === "pequeña") piw *= 0.9;
    if (frameSize === "grande")  piw *= 1.1;
    pesoIdeal = +piw.toFixed(1);
  }

  // ICM — Índice Cintura-Muñeca (distribución de grasa y riesgo cardiometabólico)
  let icm = null, icmRiesgo = null;
  if (cinturaCm && muñecaCm && muñecaCm > 0) {
    icm = +(cinturaCm / muñecaCm).toFixed(2);
    if (sexo === "F")      icmRiesgo = icm < 11   ? "bajo" : icm < 12   ? "moderado" : "alto";
    else if (sexo === "M") icmRiesgo = icm < 10.4 ? "bajo" : icm < 11.3 ? "moderado" : "alto";
    else                   icmRiesgo = icm < 10.7 ? "bajo" : icm < 11.6 ? "moderado" : "alto";
  }

  const floor = sexo === "M" ? 1500 : 1200;
  const obj = p.objetivo || "perder";
  const kcalMult = obj === "ganar" ? 1.15 : obj === "mantener" ? 1.0 : 0.8;
  const objetivoDeficit = Math.max(Math.round(tdee * kcalMult), floor);
  const prote = Math.round(masaMagra ? masaMagra * 2.2 : pesoKg * 1.8);
  const grasa = Math.round(pesoKg * 0.9);
  const kcalRest = objetivoDeficit - (prote * 4 + grasa * 9);
  const carbs = Math.max(0, Math.round(kcalRest / 4));
  const aguaMl = Math.round(pesoKg * 35);
  return { imc: +imc.toFixed(1), bmr: Math.round(bmr), tdee: Math.round(tdee), bf: bf != null ? +bf.toFixed(1) : null, masaMagra: masaMagra ? +masaMagra.toFixed(1) : null, objetivoDeficit, prote, grasa, carbs, aguaMl, vasos: Math.max(6, Math.round(aguaMl / 250)), frameSize, pesoIdeal, icm, icmRiesgo };
}

/* ---------- RING ---------- */
function Ring({ progress, size = 78, stroke = 9, color = "#E79FAE", track = "#0000000f", children }) {
  const r = (size - stroke) / 2, c = 2 * Math.PI * r, off = c * (1 - Math.min(1, Math.max(0, progress)));
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size / 2} cy={size / 2} r={r} stroke={track} strokeWidth={stroke} fill="none" />
        <circle cx={size / 2} cy={size / 2} r={r} stroke={color} strokeWidth={stroke} fill="none" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} style={{ transition: "stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)" }} />
      </svg>
      <div style={{ position: "absolute", top: 0, right: 0, bottom: 0, left: 0, display: "grid", placeItems: "center" }}>{children}</div>
    </div>
  );
}

/* ---------- MINI CHART ---------- */
function MiniChart({ data }) {
  const w = 320, h = 160, pad = 26;
  const ys = data.map((d) => d.peso), min = Math.min(...ys) - 0.3, max = Math.max(...ys) + 0.3;
  const px = (i) => data.length <= 1 ? w / 2 : pad + i * ((w - 2 * pad) / (data.length - 1));
  const py = (v) => h - pad - ((v - min) / (max - min)) * (h - 2 * pad);
  const pts = data.map((d, i) => px(i) + "," + py(d.peso)).join(" ");
  return (
    <svg viewBox={"0 0 " + w + " " + h} style={{ width: "100%", height: 180 }}>
      {[0, 1, 2].map((k) => <line key={k} x1={pad} x2={w - pad} y1={pad + k * (h - 2 * pad) / 2} y2={pad + k * (h - 2 * pad) / 2} stroke="#0000000a" />)}
      <polyline points={pts} fill="none" stroke="#E79FAE" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
      {data.map((d, i) => <circle key={i} cx={px(i)} cy={py(d.peso)} r="4" fill="#E79FAE" />)}
      {data.map((d, i) => <text key={"t" + i} x={px(i)} y={h - 6} textAnchor="middle" fontSize="11" fill="#9aa0b4" fontFamily="Nunito">{d.d}</text>)}
    </svg>
  );
}

/* ---------- NUMFIELD ---------- */
function NumField({ label, value, onChange, suffix, min, max, hint }) {
  const [text, setText] = useState(String(value));
  const clamp = (v) => Math.min(max, Math.max(min, v));
  const commit = (v) => { const n = clamp(v); onChange(n); setText(String(n)); };
  return (
    <div className="field">
      <label>{label}</label>
      <div className="stepper">
        <button onClick={() => commit(value - 1)}>–</button>
        <div className="num-wrap">
          <input className="num-input" inputMode="numeric" pattern="[0-9]*" value={text}
            onFocus={(e) => e.target.select()}
            onChange={(e) => { const t = e.target.value.replace(/[^0-9]/g, ""); setText(t); const n = parseInt(t, 10); if (!isNaN(n)) onChange(n); }}
            onBlur={() => { const n = parseInt(text, 10); commit(isNaN(n) ? value : n); }} />
          <span className="num-suf">{suffix}</span>
        </div>
        <button onClick={() => commit(value + 1)}>+</button>
      </div>
      {hint && <p className="hint">{hint}</p>}
    </div>
  );
}

function NewPassScreen({ onDone }) {
  const [pass, setPass] = useState("");
  const [pass2, setPass2] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [cargando, setCargando] = useState(false);
  const [error, setError] = useState(null);
  const [listo, setListo] = useState(false);

  const inputStyle = {
    width: "100%", padding: "13px 14px", border: "2px solid #eceff7",
    borderRadius: 14, fontFamily: "Nunito", fontSize: 15, outline: "none",
    marginBottom: 10, color: "#2A2D43", background: "#fafbfd"
  };

  const handleSubmit = async () => {
    setError(null);
    if (!pass || pass.length < 6) { setError("Mínimo 6 caracteres."); return; }
    if (pass !== pass2) { setError("Las contraseñas no coinciden."); return; }
    setCargando(true);
    try {
      const { error: e } = await sb.auth.updateUser({ password: pass });
      if (e) throw e;
      setListo(true);
    } catch(e) {
      setError(e.message);
    }
    setCargando(false);
  };

  if (listo) return (
    <div className="screen center" style={{ background: "linear-gradient(180deg,#F3ECFF,#E7F7F4)", gap: 12 }}>
      <Axo paletteKey="durazno" size={160} mood="amor" />

      <p className="muted" style={{ maxWidth: 280, textAlign: "center" }}>Ya puedes entrar con tu nueva contraseña.</p>
      <button className="btn primary big" onClick={onDone}>Entrar a AxoloFit</button>
    </div>
  );

  return (
    <div className="screen center" style={{ background: "linear-gradient(180deg,#F3ECFF,#E7F7F4)", gap: 0 }}>
      <Axo paletteKey="durazno" size={140} />
      <h1 className="display" style={{ fontSize: 24, margin: "6px 0 4px" }}>Nueva contraseña</h1>
      <p className="muted" style={{ marginBottom: 20, fontSize: 14, maxWidth: 270 }}>Elige una contraseña nueva para tu cuenta.</p>
      <div style={{ width: "100%", maxWidth: 320 }}>
        <div style={{ position: "relative", marginBottom: 10 }}>
          <input
            style={{ ...inputStyle, marginBottom: 0, paddingRight: 48 }}
            placeholder="Nueva contraseña (mín. 6 caracteres)"
            type={showPass ? "text" : "password"}
            value={pass}
            onChange={e => setPass(e.target.value)}
          />
          <button type="button" onClick={() => setShowPass(s => !s)}
            style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", color: "#9aa0b4", padding: 4, display: "flex", alignItems: "center" }}>
            <Icon name={showPass ? "eyeOff" : "eye"} size={20} />
          </button>
        </div>
        <input style={inputStyle} placeholder="Repite la contraseña"
          type={showPass ? "text" : "password"} value={pass2}
          onChange={e => setPass2(e.target.value)} />
        {error && <p style={{ color: "#c0392b", fontSize: 13, fontWeight: 700, marginBottom: 10, textAlign: "center" }}>{error}</p>}
        <button className="btn primary big" onClick={handleSubmit} disabled={cargando}>
          {cargando ? "Guardando…" : "Guardar contraseña"}
        </button>
      </div>
    </div>
  );
}

function MemoScreen({ pet, chub, petName, setScreen, setXp, showToast, best, recordBest }) {
  const POOL=["🥑","🌮","🥗","🍳","🐟","🫘","🍓","🥦","🍅","🥕","🌽","🍇"];
  function build(n){ const es=POOL.slice(0,n); return [...es,...es].map((e,i)=>({id:i,e})).sort(()=>Math.random()-.5); }
  const [pairs,setPairs]=useState(6);
  const [cards,setCards]=useState(()=>build(6));
  const [flip,setFlip]=useState([]);
  const [matched,setMatched]=useState([]);
  const [moves,setMoves]=useState(0);
  const [lock,setLock]=useState(false);
  const [react,setReact]=useState(false);
  const [racha,setRacha]=useState(0);
  const [rachaFlash,setRachaFlash]=useState(false);
  const won=cards.length>0 && matched.length===cards.length;
  const nivel=(pairs-6)/2+1;
  const reward=Math.max(20,pairs*8);
  const click=(i)=>{
    if(lock||won||flip.includes(i)||matched.includes(i)) return;
    const nf=[...flip,i];
    if(nf.length===1){ setFlip(nf); return; }
    setFlip(nf); setMoves(m=>m+1); setLock(true);
    if(cards[nf[0]].e===cards[nf[1]].e){
      setReact(true); setTimeout(()=>setReact(false),800);
      setRacha(r=>{ const nr=r+1; if(nr===3||nr===5){ setRachaFlash(true); setTimeout(()=>setRachaFlash(false),600); } return nr; });
      setTimeout(()=>{ setMatched(m=>[...m,nf[0],nf[1]]); setFlip([]); setLock(false); },420);
    } else { setRacha(0); setTimeout(()=>{ setFlip([]); setLock(false); },820); }
  };
  const nextLevel=()=>{ const np=Math.min(POOL.length,pairs+2); recordBest("memo", nivel+1); setXp(x=>Math.min(99,x+reward)); showToast("+"+reward+" XP 🧠 ¡Nivel "+(nivel+1)+"!"); setPairs(np); setCards(build(np)); setFlip([]); setMatched([]); setMoves(0); setLock(false); };
  return (
    <div className="screen" style={{background:"linear-gradient(180deg,#F0EBFF,#E2D8FF)"}}>
      <Header title="🧠 Memorama de comida" back={()=>setScreen("arcade")} />
      <div className="scroll">
        <div className="center" style={{marginTop:4,marginBottom:4}}><Axo paletteKey={pet.palette} accessory={pet.accessory} outfit={pet.outfit} estilo={pet.estilo} chub={chub} mood={(react||won)?"amor":"feliz"} size={92} /></div>
        {won ? (<div className="center" style={{paddingTop:4}}>
          <h2 className="display" style={{fontSize:21,margin:"4px 12px"}}>¡{petName} está feliz! {pairs} pares en {moves} movimientos</h2>
          <p className="muted sm">🏆 Mejor nivel: {Math.max(best,nivel)}</p>
          <p className="muted" style={{marginBottom:14}}>Ganaste +{reward} XP</p>
          <button className="btn primary big" style={{marginBottom:8}} onClick={nextLevel}>🎉 Siguiente nivel (+2 pares)</button>
          <button className="btn ghost" onClick={()=>{ recordBest("memo", nivel); setXp(x=>Math.min(99,x+reward)); showToast("+"+reward+" XP 🧠"); setScreen("arcade"); }}>Reclamar y salir</button>
        </div>) : (<div>
          <p style={{textAlign:"center",fontFamily:"Fredoka",fontWeight:600,fontSize:15,color:"#7a8099",margin:"2px 0 4px"}}>Nivel {nivel} · {moves} mov · {matched.length/2}/{pairs} pares</p>
          {racha>=2 && <p style={{textAlign:"center",fontFamily:"Fredoka",fontWeight:700,fontSize:rachaFlash?17:13,color:"#F2B705",margin:"0 0 10px"}}>🔥 Racha x{racha}</p>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:9,padding:"0 4px"}}>
            {cards.map((cd,i)=>{ const show=flip.includes(i)||matched.includes(i); return <button key={cd.id} onClick={()=>click(i)} style={{aspectRatio:"1",borderRadius:14,border:"none",fontSize:30,cursor:"pointer",background:show?"#fff":"linear-gradient(135deg,#8E78FF,#7C5CFF)",color:"#fff",boxShadow:"0 4px 12px #0000001a",opacity:matched.includes(i)?0.5:1,transition:"opacity .25s"}}>{show ? cd.e : (<svg viewBox="8 14 84 84" width="34" height="34" xmlns="http://www.w3.org/2000/svg"><g transform="translate(22,50) scale(-0.46,0.46)"><g transform="rotate(-36)"><path d="M0 -6 C 20 -11 36 -10 44 -5 C 50 -2 50 2 44 5 C 36 10 20 11 0 6 C 4 2 4 -2 0 -6 Z" fill="#EDC4D8"/></g><g transform="rotate(-10)"><path d="M0 -6 C 20 -11 36 -10 44 -5 C 50 -2 50 2 44 5 C 36 10 20 11 0 6 C 4 2 4 -2 0 -6 Z" fill="#EDC4D8"/></g><g transform="rotate(16)"><path d="M0 -6 C 20 -11 36 -10 44 -5 C 50 -2 50 2 44 5 C 36 10 20 11 0 6 C 4 2 4 -2 0 -6 Z" fill="#EDC4D8"/></g></g><g transform="translate(78,50) scale(0.46,0.46)"><g transform="rotate(-36)"><path d="M0 -6 C 20 -11 36 -10 44 -5 C 50 -2 50 2 44 5 C 36 10 20 11 0 6 C 4 2 4 -2 0 -6 Z" fill="#EDC4D8"/></g><g transform="rotate(-10)"><path d="M0 -6 C 20 -11 36 -10 44 -5 C 50 -2 50 2 44 5 C 36 10 20 11 0 6 C 4 2 4 -2 0 -6 Z" fill="#EDC4D8"/></g><g transform="rotate(16)"><path d="M0 -6 C 20 -11 36 -10 44 -5 C 50 -2 50 2 44 5 C 36 10 20 11 0 6 C 4 2 4 -2 0 -6 Z" fill="#EDC4D8"/></g></g><ellipse cx="50" cy="50" rx="28" ry="25" fill="#F9DECE"/><ellipse cx="38" cy="56" rx="5.5" ry="4" fill="#F4A6C0" opacity="0.65"/><ellipse cx="62" cy="56" rx="5.5" ry="4" fill="#F4A6C0" opacity="0.65"/><ellipse cx="40" cy="48" rx="4" ry="4.6" fill="#5B4636"/><circle cx="41.3" cy="46.3" r="1.4" fill="#fff"/><ellipse cx="61" cy="48" rx="4.6" ry="5.2" fill="#5B4636"/><circle cx="62.5" cy="46" r="1.6" fill="#fff"/><path d="M44 60 Q50 65 56 60" fill="none" stroke="#C77B92" strokeWidth="2.2" strokeLinecap="round"/><line x1="69" y1="56" x2="80" y2="68" stroke="#8a6d52" strokeWidth="4.5" strokeLinecap="round"/><circle cx="61" cy="48" r="11" fill="#CDE8FF" opacity="0.4"/><circle cx="61" cy="48" r="11" fill="none" stroke="#8a6d52" strokeWidth="3.5"/><path d="M55 43 Q57 41 61 41" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" opacity="0.85"/></svg>)}</button>; })}
          </div>
          <p className="muted sm" style={{textAlign:"center",marginTop:14}}>Encuentra los pares. Al ganar, ¡{petName} pide más pares!</p>
          <div style={{height:60}}/>
        </div>)}
      </div>
    </div>
  );
}

function SimonScreen({ pet, chub, petName, setScreen, setXp, showToast, best, recordBest }) {
  const FOODS=["🥑","🌮","🐟","🍓"]; const COLS=["#34BC97","#FF9036","#3FA9F5","#E0556E"];
  const [seq,setSeq]=useState([]);
  const [step,setStep]=useState(0);
  const [showing,setShowing]=useState(false);
  const [active,setActive]=useState(-1);
  const [over,setOver]=useState(false);
  const [started,setStarted]=useState(false);
  React.useEffect(()=>{
    if(seq.length===0) return;
    setShowing(true); setStep(0);
    const timers=[]; let i=0;
    const playNext=()=>{
      setActive(seq[i]);
      timers.push(setTimeout(()=>{ setActive(-1); i++; if(i<seq.length){ timers.push(setTimeout(playNext,340)); } else { timers.push(setTimeout(()=>setShowing(false),340)); } },560));
    };
    timers.push(setTimeout(playNext,650));
    return ()=>timers.forEach(clearTimeout);
  },[seq]);
  const begin=()=>{ setOver(false); setStarted(true); setStep(0); setSeq([Math.floor(Math.random()*4)]); };
  const tap=(i)=>{
    if(showing||over||!started) return;
    setActive(i); setTimeout(()=>setActive(a=>a===i?-1:a),220);
    if(i===seq[step]){
      if(step+1===seq.length){ setStep(0); setTimeout(()=>setSeq(arr=>[...arr,Math.floor(Math.random()*4)]),560); }
      else setStep(step+1);
    } else { setOver(true); setStarted(false); recordBest("simon", seq.length-1); }
  };
  const score=Math.max(0,seq.length-(over?1:0));
  return (
    <div className="screen" style={{background:"linear-gradient(180deg,#EAF6FF,#E2D8FF)"}}>
      <Header title="🎵 Axo Dice" back={()=>setScreen("arcade")} />
      <div className="scroll" style={{display:"flex",flexDirection:"column",alignItems:"center"}}>

}

function CatchScreen({ pet, chub, petName, setScreen, setXp, showToast, best, recordBest }) {
  const H=340;
  const HEALTHY=["🥗","🥑","🍓","🐟","🥦"], JUNK=["🍩","🍟","🥤","🍰"];
  const [items,setItems]=useState([]);
  const [bx,setBx]=useState(0.5);
  const bxRef=React.useRef(0.5);
  const [score,setScore]=useState(0);
  const scoreRef=React.useRef(0);
  const [level,setLevel]=useState(1);
  const levelRef=React.useRef(1);
  const [time,setTime]=useState(20);
  const [over,setOver]=useState(false);
  const [levelUp,setLevelUp]=useState(false);
  const [fx,setFx]=useState([]);
  const [bounce,setBounce]=useState(false);
  const [combo,setCombo]=useState(0);
  const comboRef=React.useRef(0);
  const [comboFlash,setComboFlash]=useState(false);
  const target=(lv)=>lv*6+4;
  React.useEffect(()=>{
    let id=0,tick=0,lastX=0.5;
    const iv=setInterval(()=>{ tick++; setItems(arr=>{
      const lv=levelRef.current;
      const speed=3.2+lv*0.7;
      const spawnEvery=Math.max(7,15-lv);
      let next=arr.map(it=>({...it,y:it.y+it.sp}));
      if(tick%spawnEvery===0){
        let nx=0.12+Math.random()*0.76;
        if(Math.abs(nx-lastX)<0.3){ nx=nx<lastX?nx-0.32:nx+0.32; nx=Math.max(0.12,Math.min(0.88,nx)); }
        lastX=nx;
        const sano=Math.random()<(0.64-lv*0.015);
        next.push({id:++id,x:nx,y:0,sano,sp:speed+Math.random()*1.6,e:sano?HEALTHY[Math.floor(Math.random()*HEALTHY.length)]:JUNK[Math.floor(Math.random()*JUNK.length)]});
      }
      const catchY=H-58; let delta=0; const keep=[]; const caughtNow=[]; let comboRoto=false;
      next.forEach(it=>{ if(it.y>=catchY && it.y<=catchY+42 && Math.abs(it.x-bxRef.current)<0.13){ caughtNow.push(it); } else if(it.y<H+24){ keep.push(it); } });
      const fxPts=[];
      caughtNow.forEach(it=>{
        if(it.sano){
          comboRef.current+=1;
          const pts=comboRef.current>=8?3:comboRef.current>=4?2:1;
          delta+=pts;
          fxPts.push({fxId:"fx"+it.id,x:it.x,sano:true,pts});
        } else {
          if(comboRef.current>=3) comboRoto=true;
          comboRef.current=0;
          delta-=1;
          fxPts.push({fxId:"fx"+it.id,x:it.x,sano:false,pts:1});
        }
      });
      if(caughtNow.length>0) setCombo(comboRef.current);
      if(delta!==0){ scoreRef.current=Math.max(0,scoreRef.current+delta); setScore(scoreRef.current); }
      if(caughtNow.length>0){
        setBounce(true); setTimeout(()=>setBounce(false),220);
        setFx(f=>[...f,...fxPts]);
        setTimeout(()=>setFx(f=>f.filter(x=>!fxPts.some(n=>n.fxId===x.fxId))),480);
        if([4,8].includes(comboRef.current)){ setComboFlash(true); setTimeout(()=>setComboFlash(false),700); }
        if(comboRoto) showToast("💥 Combo roto");
      }
      return keep;
    }); },55);
    const tmr=setInterval(()=>setTime(t=>{
      if(t<=1){
        if(scoreRef.current>=target(levelRef.current)){
          levelRef.current+=1; setLevel(levelRef.current); setLevelUp(true); setTimeout(()=>setLevelUp(false),1400);
          setItems([]); return 20;
        } else { clearInterval(tmr); clearInterval(iv); setOver(true); recordBest("catch",scoreRef.current); return 0; }
      }
      return t-1;
    }),1000);
    return()=>{clearInterval(iv);clearInterval(tmr);};
  },[]);
  const move=(e)=>{ const r=e.currentTarget.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left; const ff=Math.max(.06,Math.min(.94,cx/r.width)); bxRef.current=ff; setBx(ff); };
  const tgt=target(level);
  return (
    <div className="screen" style={{background:"linear-gradient(180deg,#EAF6FF,#D7ECFF)"}}>
      <Header title="🍬 Atrapa lo sano" back={()=>setScreen("arcade")} />
      {over ? (<div className="center" style={{padding:"30px 16px"}}>
        <Axo paletteKey={pet.palette} accessory={pet.accessory} outfit={pet.outfit} estilo={pet.estilo} chub={chub} mood="amor" size={150} />
        <h2 className="display" style={{fontSize:26,margin:"8px 0 2px"}}>¡{score} puntos!</h2>
        <p className="muted" style={{marginBottom:4}}>Llegaste al nivel {level} · +{score*5} XP</p>
        {score>=best && score>0 && <p className="display" style={{color:"#F2B705",fontSize:16,marginBottom:6}}>🏆 ¡Nuevo récord!</p>}
        {score<best && best-score<=3 && <p className="muted sm" style={{marginBottom:6,color:"#E79FAE",fontWeight:700}}>😬 ¡Te faltó{best-score===1?"":"n"} {best-score} para tu récord!</p>}
        {score<best && best-score>3 && <p className="muted sm" style={{marginBottom:6}}>Récord: {best}</p>}
        <button className="btn primary big" onClick={()=>{ setXp(x=>Math.min(99,x+score*5)); showToast("+"+score*5+" XP 🍬"); setScreen("arcade"); }}>Reclamar y volver</button>
      </div>) : (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"0 8px",position:"relative"}}>
          <div style={{display:"flex",justifyContent:"space-between",width:"100%",padding:"4px 8px 6px",fontFamily:"Fredoka",fontWeight:700}}>
            <span style={{color:"#7C5CFF"}}>Nivel {level}</span>
            <span style={{color:"#E79FAE"}}>⏱️ {time}s</span>
            <span style={{color:"#34BC97"}}>🍬 {score}/{tgt}</span>
          </div>
          {combo>=2 && <p style={{textAlign:"center",fontFamily:"Fredoka",fontWeight:700,fontSize:comboFlash?18:14,color:"#F2B705",margin:"0 0 4px",transition:"font-size .15s"}}>🔥 Combo x{combo}{combo>=8?" (¡x3 puntos!)":combo>=4?" (x2 puntos)":""}</p>}
          <div style={{width:"100%",height:5,background:"#dfe9f5",borderRadius:3,marginBottom:8}}><div style={{width:Math.min(100,score/tgt*100)+"%",height:"100%",background:"#34BC97",borderRadius:3,transition:"width .2s"}}/></div>
          <div onPointerMove={move} onTouchMove={move} style={{position:"relative",width:"100%",height:H,borderRadius:20,overflow:"hidden",background:"linear-gradient(180deg,#C8E8FF,#A5D4F5)",touchAction:"none",cursor:"pointer"}}>
            {items.map(it=><span key={it.id} style={{position:"absolute",left:(it.x*100)+"%",top:it.y,transform:"translate(-50%,-50%)",fontSize:30,userSelect:"none",filter:"drop-shadow(0 2px 3px #00000022)"}}>{it.e}</span>)}
            {fx.map(f=><span key={f.fxId} style={{position:"absolute",left:(f.x*100)+"%",top:H-58,fontFamily:"Fredoka",fontWeight:700,fontSize:20,color:f.sano?"#34BC97":"#E15B5B",pointerEvents:"none",animation:"catchPop .48s ease-out forwards"}}>{f.sano?"+"+f.pts:"-1"}</span>)}
            <div style={{position:"absolute",bottom:8,left:(bx*100)+"%",transformOrigin:"bottom center",animation:bounce?"catchBounce .22s ease-out":"none",transform:bounce?undefined:"translateX(-50%)"}}><Axo paletteKey={pet.palette} outfit={pet.outfit} estilo={pet.estilo} chub={chub} size={68}/></div>
            {levelUp && <div style={{position:"absolute",top:0,right:0,bottom:0,left:0,display:"flex",alignItems:"center",justifyContent:"center",background:"#ffffffaa"}}><span className="display" style={{fontSize:30,color:"#7C5CFF"}}>¡Nivel {level}! 🎉</span></div>}
          </div>
          <p className="muted sm" style={{textAlign:"center",marginTop:10}}>Llega a {tgt} pts antes de que acabe el tiempo · 🏆 {best}</p>
        </div>
      )}
    </div>
  );
}

function CalScreen({ pet, chub, petName, setScreen, setXp, showToast, best, recordBest }) {
  const [i,setI]=useState(0);
  const [score,setScore]=useState(0);
  const [sel,setSel]=useState(null);
  const [done,setDone]=useState(false);
  const [racha,setRacha]=useState(0);
  const [rachaFlash,setRachaFlash]=useState(false);
  const pair=KCAL_PAIRS[i];
  const answer=(pick)=>{
    if(sel) return;
    setSel(pick);
    const correct=pair.ak>pair.bk?"a":"b";
    const acerto=pick===correct;
    if(acerto)setScore(sc=>sc+1);
    if(acerto) setRacha(r=>{ const nr=r+1; if(nr===3||nr===5){ setRachaFlash(true); setTimeout(()=>setRachaFlash(false),600); } return nr; });
    else setRacha(0);
    const fin = acerto ? score+1 : score; setTimeout(()=>{ setSel(null); if(i+1>=KCAL_PAIRS.length){ setDone(true); recordBest("cal", fin); } else setI(x=>x+1); },1000);
  };
  const correctIs=pair&&(pair.ak>pair.bk?"a":"b");
  return (
    <div className="screen" style={{background:"linear-gradient(180deg,#FFF6E6,#FFE9C8)"}}>
      <Header title="🔥 ¿Cuál tiene más calorías?" back={()=>setScreen("arcade")} />
      <div className="scroll" style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
        {done?(<div className="center" style={{paddingTop:20}}>
          <Axo paletteKey={pet.palette} accessory={pet.accessory} outfit={pet.outfit} estilo={pet.estilo} chub={chub} mood="amor" size={150}/>
          <h2 className="display" style={{fontSize:26,margin:"8px 0 4px"}}>¡{score}/{KCAL_PAIRS.length} correctas!</h2>
          {score>=best && score>0 && <p className="display" style={{color:"#F2B705",fontSize:15}}>🏆 ¡Nuevo récord!</p>}
          {score<best && best-score<=2 && <p className="muted sm" style={{color:"#E79FAE",fontWeight:700}}>😬 ¡Te faltó{best-score===1?"":"n"} {best-score} para tu récord!</p>}
          <p className="muted" style={{marginBottom:16}}>Ganaste +{score*12} XP · 🏆 {Math.max(best,score)}</p>
          <button className="btn primary big" onClick={()=>{ setXp(x=>Math.min(99,x+score*12)); showToast("+"+score*12+" XP 🔥"); setScreen("arcade"); }}>Reclamar y volver</button>
        </div>):(<div style={{width:"100%",padding:"8px 0"}}>
          <p style={{textAlign:"center",fontFamily:"Fredoka",fontWeight:600,color:"#9aa0b4",marginBottom:8}}>{i+1} de {KCAL_PAIRS.length} · ¿cuál tiene MÁS calorías?</p>
          <p style={{textAlign:"center",fontFamily:"Fredoka",fontWeight:700,color:"#34BC97",marginBottom:racha>=2?4:18}}>Aciertos: {score}</p>
          {racha>=2 && <p style={{textAlign:"center",fontFamily:"Fredoka",fontWeight:700,fontSize:rachaFlash?17:13,color:"#F2B705",marginBottom:14,transition:"font-size .15s"}}>🔥 Racha x{racha}</p>}
          <div style={{display:"flex",gap:12}}>
            {[["a",pair.a,pair.ak],["b",pair.b,pair.bk]].map(([k,name,kcal])=>{
              const isCorrect=sel&&k===correctIs; const isWrong=sel&&k===sel&&k!==correctIs;
              return <button key={k} onClick={()=>answer(k)} style={{flex:1,padding:"20px 12px",borderRadius:20,border:"3px solid",borderColor:isCorrect?"#34BC97":isWrong?"#E0556E":"#eceff7",background:isCorrect?"#EAF7F2":isWrong?"#FDECEA":"#fff",cursor:sel?"default":"pointer",transition:"all .2s",textAlign:"center"}}>
                <b style={{fontFamily:"Fredoka",fontSize:17,display:"block",marginBottom:6}}>{name}</b>
                {sel&&<span style={{fontFamily:"Fredoka",fontWeight:700,fontSize:20,color:isCorrect?"#34BC97":isWrong?"#E0556E":"#9aa0b4"}}>{kcal} kcal</span>}
                {!sel&&<span className="muted sm">Toca para elegir</span>}
              </button>;
            })}
          </div>
        </div>)}
      </div>
    </div>
  );
}

function App() {
  const [userId, setUserId] = useState(null);
  const [phase, setPhase] = useState("auth"); // "auth" | "onboarding" | "app"
  const [screen, setScreen] = useState("home");
  const scrollPositions = React.useRef({});
  const sRef = (k) => (el) => { if (el) el.scrollTop = scrollPositions.current[k] || 0; };
  const sSave = (k) => (e) => { scrollPositions.current[k] = e.target.scrollTop; };
  const hRef = (k) => (el) => { if (el) el.scrollLeft = scrollPositions.current["h_" + k] || 0; };
  const hSave = (k) => (e) => { scrollPositions.current["h_" + k] = e.target.scrollLeft; };
  const [profile, setProfile] = useState({ ...DEMO });
  const [petName, setPetName] = useState("Axo");
  const targets = useMemo(() => { try { return computeProfile(profile); } catch(e) { return computeProfile({...DEMO}); } }, [profile]);
  const [pet, setPet] = useState({ palette: "durazno", accessory: "ninguno", bg: "lavanda", estilo: "clasico", outfit: "ninguno", evo: "joven" });
  const updatePet = (newPet) => {
    setPet(newPet);
    if (userId) guardarAxo(userId, { variedad: newPet.palette, accesorio: newPet.accessory, outfit: newPet.outfit, nivel: level, xp, racha: streak });
  };

  /* --- Revisar sesión activa al cargar --- */
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) { setUserId(session.user.id); cargarDatos(session.user.id); }
      else setPhase("auth");
    });
    const { data: listener } = sb.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY") { setPhase("newpass"); }
      else if (!session) { setUserId(null); setPhase("auth"); }
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  const hoyLocal = (d = new Date()) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  // Si la app se queda abierta y cambia el día del calendario, recarga los datos de hoy sola
  const diaAbiertoRef = React.useRef(hoyLocal());
  useEffect(() => {
    const revisarDia = () => {
      const hoyAhora = hoyLocal();
      if (hoyAhora !== diaAbiertoRef.current) {
        diaAbiertoRef.current = hoyAhora;
        if (userId) cargarDatos(userId);
      }
    };
    const iv = setInterval(revisarDia, 60000);
    document.addEventListener("visibilitychange", revisarDia);
    window.addEventListener("focus", revisarDia);
    return () => { clearInterval(iv); document.removeEventListener("visibilitychange", revisarDia); window.removeEventListener("focus", revisarDia); };
  }, [userId]);

  /* --- Cargar datos del usuario desde Supabase --- */
  useEffect(() => {
    if (phase === "app") { try { localStorage.setItem("axo_screen", screen); localStorage.setItem("axo_screen_t", "" + Date.now()); } catch (e) {} }
  }, [screen, phase]);
  const cargarDatos = async (uid) => {
    try {
      const [{ data: perfil }, { data: axo }, { data: comidas }, { data: pesos }, { count: totComidas }, { data: scores }] = await Promise.all([
        sb.from("profiles").select("*").eq("id", uid).single(),
        sb.from("axo_state").select("*").eq("id", uid).single(),
        sb.from("food_log").select("*").eq("user_id", uid).eq("fecha", hoyLocal()).order("created_at"),
        sb.from("peso_log").select("*").eq("user_id", uid).order("fecha"),
        sb.from("food_log").select("id", { count: "exact", head: true }).eq("user_id", uid),
        sb.from("game_scores").select("*").eq("user_id", uid),
      ]);
      if (scores && scores.length > 0) {
        setBest(Object.fromEntries(scores.map((s) => [s.game_key, s.score])));
      }
      setTotalComidas(totComidas || 0);
      if (pesos && pesos.length > 0) {
        setPesoHist(pesos.map(r => ({ fecha: r.fecha, peso: parseFloat(r.peso) })));
        setPesoActual(parseFloat(pesos[pesos.length - 1].peso));
      }
      if (perfil && perfil.nombre) {
        setPetName(perfil.nombre || "Axo");
        setProfile(p => ({
          ...p,
          objetivo: perfil.objetivo || p.objetivo,
          edad: perfil.edad || p.edad,
          pesoKg: perfil.peso || p.pesoKg,
          estaturaCm: perfil.altura || p.estaturaCm,
        }));
        if (axo) {
          setPet(p => ({
            ...p,
            palette: axo.variedad || p.palette,
            accessory: axo.accesorio || p.accessory,
            outfit: axo.outfit || p.outfit,
          }));
          setLevel(axo.nivel != null ? axo.nivel : 1);
          setXp(axo.xp != null ? axo.xp : 0);
          const rachaGuardada = axo.racha != null ? axo.racha : 0;
          const ultDia = axo.ultimo_dia || null;
          if (rachaGuardada > 0 && ultDia) {
            const hd = new Date(); const [yy, mm, dd] = ultDia.split("-").map(Number);
            const dif = Math.floor((new Date(hd.getFullYear(), hd.getMonth(), hd.getDate()) - new Date(yy, mm - 1, dd)) / 86400000);
            if (dif >= 2) {
              setStreak(0); setUltimoDia(null);
              setTimeout(() => showToast("💔 " + ((perfil && perfil.nombre) || "Axo") + " te extrañó… tu racha de " + rachaGuardada + " días se reinició"), 1200);
              sb.from("axo_state").update({ racha: 0, ultimo_dia: null }).eq("id", uid).then(() => {});
            } else {
              setStreak(rachaGuardada); setUltimoDia(ultDia);
            }
          } else {
            setStreak(rachaGuardada); setUltimoDia(ultDia);
          }
          setSkinsUnlocked(axo.skins ? axo.skins.split(",").filter(Boolean) : []);
        }
        if (comidas && comidas.length > 0) {
          setLog(comidas.map((c) => ({ id: c.id, n: c.nombre, kcal: c.kcal, p: c.proteina, c: c.carbos, g: c.grasa, qty: 1, uid: "db" + c.id })));
        }
        try {
          const sv = localStorage.getItem("axo_screen");
          const t = +localStorage.getItem("axo_screen_t") || 0;
          if (sv && sv !== "home" && Date.now() - t < 1800000) setScreen(sv);
        } catch (e) {}
        setPhase("app");
      } else {
        setPhase("onboarding");
      }
    } catch (e) { setPhase("onboarding"); }
  };

  /* --- Guardar perfil en Supabase --- */
  const guardarPerfil = async (uid, p, name) => {
    await sb.from("profiles").upsert({
      id: uid, nombre: name,
      objetivo: p.objetivo, edad: p.edad,
      peso: p.pesoKg, altura: p.estaturaCm,
    });
  };

  /* --- Guardar estado de Axo --- */
  const guardarAxo = async (uid, axoData) => {
    await sb.from("axo_state").upsert({ id: uid, ...axoData });
  };

  /* --- Guardar comida en Supabase --- */
  const guardarComida = async (uid, food) => {
    await sb.from("food_log").insert({
      user_id: uid, nombre: food.n,
      kcal: food.kcal, proteina: food.p,
      carbos: food.c, grasa: food.g,
      comida: "libre",
    });
  };

  /* --- Borrar comida de Supabase --- */
  const borrarComida = async (foodId) => {
    if (typeof foodId === "string") await sb.from("food_log").delete().eq("id", foodId);
  };

  /* --- Guardar / registrar peso --- */
  const guardarPeso = async (uid, peso) => {
    const fecha = hoyLocal();
    await sb.from("peso_log").upsert({ user_id: uid, fecha, peso }, { onConflict: "user_id,fecha" });
  };
  const registrarPeso = async () => {
    const peso = parseFloat(pesoInput);
    if (!peso || peso < 30 || peso > 300) { showToast("Pon un peso válido (30–300 kg)"); return; }
    const fecha = hoyLocal();
    setPesoHist(h => [...h.filter(r => r.fecha !== fecha), { fecha, peso }].sort((a, b) => a.fecha.localeCompare(b.fecha)));

                <p className="legal-note">Borrador de muestra. Debe revisarlo un abogado antes de publicarse.</p>
                <p><b>Responsable.</b> Ricky Rabbit Dev Studio (“nosotros”) es responsable del tratamiento de tus datos personales.</p>
                <p><b>Datos que recabamos.</b> De identificación (nombre, correo) y de salud: sexo, edad, peso, estatura, circunferencias y hábitos alimenticios. Los datos de salud son <b>datos personales sensibles</b>.</p>
                <p><b>Finalidades.</b> Calcular tus requerimientos nutricionales, personalizar recomendaciones y operar la app. No tomamos decisiones médicas por ti ni reemplazamos a un profesional.</p>
                <p><b>Consentimiento.</b> Para datos sensibles obtenemos tu consentimiento libre, específico e informado, conforme a la Ley Federal de Protección de Datos Personales en Posesión de los Particulares vigente (DOF 20 de marzo de 2025).</p>
                <p><b>Derechos ARCO.</b> Puedes acceder, rectificar, cancelar u oponerte, y revocar tu consentimiento, en privacidad@rickyrabbit.studio. La autoridad es la Secretaría Anticorrupción y Buen Gobierno.</p>
                <p><b>Seguridad.</b> Aplicamos medidas de seguridad para proteger tus datos. No vendemos tus datos personales.</p>
              </div>
              <button className="btn primary big" onClick={() => setOverlay(null)}>Entendido</button>
            </div>
          </div>
        )}
        {eating && (
          <div className="eat-pop">
            <div className="eat-bubble">
              <Axo paletteKey={pet.palette} accessory={pet.accessory} outfit={pet.outfit} estilo={pet.estilo} chub={chub} evo={computedEvo} mood="amor" rubbing={true} size={130} />
              <span style={{ position: "absolute", top: "8%", left: "22%", fontSize: 18, animation: "floaty 1.4s ease-in-out infinite" }}>✨</span>
              <span style={{ position: "absolute", top: "14%", right: "20%", fontSize: 16, animation: "floaty 1.6s ease-in-out infinite .3s" }}>😋</span>
            </div>
          </div>
        )}
        {toast && <div className="toast">{toast}</div>}
      </div>
    </div>
  );
}


class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  render() {
    if (this.state.err) return (
      <div style={{padding:20,fontFamily:"Nunito",color:"#c00"}}>
        <b>Error:</b><br/>{this.state.err.message}<br/>
        <pre style={{fontSize:11,marginTop:8,whiteSpace:"pre-wrap"}}>{this.state.err.stack&&this.state.err.stack.slice(0,600)}</pre>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
