<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html,body { height:100%; }
.root { min-height: 100vh; display: grid; place-items: center; background: #d7dbe6; font-family: 'Nunito', system-ui, sans-serif; color: #2A2D43; padding: 12px; }
.display { font-family: 'Fredoka', system-ui, sans-serif; font-weight: 700; }
.phone { position: relative; width: 100%; max-width: 400px; height: 96vh; max-height: 860px; background: #fff; border-radius: 32px; overflow: hidden; box-shadow: 0 24px 70px #0003; }
.screen { position: absolute; top: 0; right: 0; bottom: 0; left: 0; display: flex; flex-direction: column; }
.screen.center { align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 8px; }
.scroll { flex: 1; overflow-y: auto; padding: 14px 16px 16px; }
.muted { color: #7a8099; } .sm { font-size: 13px; } .hint { font-size: 12px; color: #9aa0b4; margin-top: 6px; }
.btn { font-family: 'Fredoka', sans-serif; font-weight: 600; border: none; border-radius: 16px; padding: 12px 18px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; font-size: 15px; }
.btn.primary { background: linear-gradient(180deg,#F7CCD4,#E79FAE); color: #5E4334; box-shadow: 0 8px 20px #e79fae55; }
.btn.primary:active { transform: scale(.97); }
.btn.big { width: 100%; padding: 15px; font-size: 17px; }
.btn.ghost { background: transparent; color: #7a8099; }
.btn.soft { background: #ffffffcc; color: #4a4f6a; font-size: 13px; padding: 10px 12px; border-radius: 13px; flex: 1; }
.btn.feature { background: #FFF6EA; color: #B06A12; border: 1.5px dashed #FFC98A; }
.btn.premium-btn { width: 100%; background: linear-gradient(180deg,#8E78FF,#7C5CFF); color: #fff; margin-top: 14px; }
.icon-btn { background: #f2f4fa; border: none; width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; cursor: pointer; color: #4a4f6a; }
.hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 14px 4px; }
.hdr-title { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 19px; }
.field { margin: 14px 0; }
.field > label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 15px; }
.stepper { display: flex; align-items: center; justify-content: space-between; background: #f4f6fb; border-radius: 16px; padding: 6px; }
.stepper button { width: 44px; height: 44px; border: none; background: #fff; border-radius: 12px; font-size: 22px; font-weight: 700; color: #E79FAE; cursor: pointer; box-shadow: 0 2px 6px #0000000f; }
.num-wrap { display: flex; align-items: baseline; gap: 3px; }
.num-input { width: 78px; text-align: center; border: none; background: transparent; font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 22px; color: #2A2D43; outline: none; padding: 4px 0; border-bottom: 2px dashed #d7dbe6; }
.num-input:focus { border-bottom-color: #E79FAE; }
.num-suf { color: #9aa0b4; font-weight: 600; font-size: 13px; }
.seg { display: flex; gap: 8px; } .seg button { flex: 1; padding: 13px; border: 2px solid #eceff7; background: #fff; border-radius: 14px; font-weight: 700; color: #7a8099; cursor: pointer; font-family: 'Nunito'; }
.seg button.on { border-color: #E79FAE; background: #FCEFF1; color: #E79FAE; }
.col { display: flex; flex-direction: column; gap: 8px; }
.row-opt { display: flex; justify-content: space-between; align-items: center; padding: 13px 15px; border: 2px solid #eceff7; background: #fff; border-radius: 14px; font-weight: 600; color: #4a4f6a; cursor: pointer; font-family: 'Nunito'; }
.row-opt.on { border-color: #E79FAE; background: #FCEFF1; color: #E79FAE; }
.footer-cta { padding: 12px 16px; border-top: 1px solid #f0f1f6; background: #fff; }
.name-input { font-family: 'Fredoka'; font-weight: 700; font-size: 22px; text-align: center; border: 2px solid #FF9DBA; border-radius: 16px; padding: 12px; width: 220px; outline: none; color: #2A2D43; }
.card { background: #fff; border: 1px solid #f0f1f6; border-radius: 20px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 16px #0000000a; color: #2A2D43; }
.card-h { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
.hero-card { background: linear-gradient(135deg,#FCEFF1,#F1EEFF); text-align: center; }
.big-num { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 46px; line-height: 1; } .big-num small { font-size: 18px; color: #7a8099; }
.macro-row { display: flex; justify-content: center; gap: 8px; font-weight: 700; font-size: 13px; margin-top: 8px; flex-wrap: wrap; }
.hero-card .macro-row span { background: #ffffff99; padding: 4px 8px; border-radius: 20px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-chip { background: #f6f7fb; border-radius: 16px; padding: 12px 8px; text-align: center; color: #2A2D43; }
.stat-chip b { font-family: 'Fredoka'; font-size: 20px; display: block; } .stat-chip small { font-size: 12px; color: #9aa0b4; } .stat-chip span { font-size: 11px; color: #7a8099; }
.safety { display: flex; gap: 10px; background: #EAF7F2; border-radius: 16px; padding: 13px; color: #2c6f5b; font-size: 12.5px; line-height: 1.45; }
.safety svg { flex-shrink: 0; margin-top: 1px; }
.home-top { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 0; }
.streak-pill { background: #fff7f0; color: #c2541f; font-weight: 800; font-size: 13px; padding: 7px 12px; border-radius: 20px; display: flex; align-items: center; gap: 5px; box-shadow: 0 3px 10px #0000000a; }
.lvl-pill { background: #fff; color: #2A2D43; font-weight: 800; font-size: 13px; padding: 7px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; box-shadow: 0 3px 10px #0000000a; }
.xp-track { width: 56px; height: 7px; background: #eef0f6; border-radius: 4px; overflow: hidden; }
.xp-fill { display: block; height: 100%; background: linear-gradient(90deg,#FFD15C,#F2B705); border-radius: 4px; transition: width .5s; }
.axo-stage { cursor: pointer; margin: 2px 0; position: relative; }
.axo-line { display: block; width: -webkit-fit-content; width: fit-content; position: relative; background: #fff; border: 2px solid #FFE0EA; border-radius: 18px; padding: 9px 16px; font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 15.5px; line-height: 1.25; color: #5a4f6a; box-shadow: 0 6px 18px #0000001c; margin: 4px auto 10px; max-width: 86%; animation: speechpop .35s cubic-bezier(.2,1.3,.5,1); }
.axo-line:before { content: ''; position: absolute; bottom: -11px; left: 50%; transform: translateX(-50%); border-left: 9px solid transparent; border-right: 9px solid transparent; border-top: 11px solid #FFE0EA; }
.axo-line:after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 9px solid #fff; }
@keyframes speechpop { 0% { transform: scale(.7); opacity: 0 } 100% { transform: scale(1); opacity: 1 } }
.rings { display: flex; justify-content: space-around; background: #fff; border-radius: 22px; padding: 14px 6px; box-shadow: 0 6px 20px #0000000c; margin-bottom: 12px; }
.ring-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.ring-c { text-align: center; line-height: 1.05; color: #2A2D43; } .ring-c b { font-family: 'Fredoka'; font-size: 16px; display: block; } .ring-c span { font-size: 10px; color: #9aa0b4; }
.ring-lbl { font-size: 12px; font-weight: 700; color: #7a8099; display: flex; align-items: center; gap: 3px; }
.quick-water { display: flex; gap: 8px; margin-bottom: 12px; }
.sug-row, .log-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 4px; border-bottom: 1px solid #f4f5f9; }
.sug-row:last-child, .log-row:last-child { border-bottom: none; }
.sug-row b, .log-row b { font-size: 14px; }
.add-btn { width: 34px; height: 34px; border-radius: 11px; border: none; background: #FCEFF1; color: #E79FAE; display: grid; place-items: center; cursor: pointer; }
.x-btn { background: none; border: none; color: #c3c8d6; cursor: pointer; padding: 4px; }
.fab { position: absolute; right: 18px; bottom: 90px; width: 60px; height: 60px; border-radius: 20px; border: none; background: linear-gradient(180deg,#F7CCD4,#E79FAE); color: #5E4334; display: grid; place-items: center; cursor: pointer; box-shadow: 0 10px 26px #e79fae66; }
.fab:active { transform: scale(.94); }
.navbar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; background: #fff; border-top: 2px solid #f0f1f6; padding: 10px 4px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 20; box-shadow: 0 -4px 16px rgba(0,0,0,0.07); }
.nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 2px; color: #b6bccb; cursor: pointer; font-family: 'Nunito'; font-weight: 700; }
.nav-btn small { font-size: 10px; } .nav-btn.on { color: #E79FAE; }
.methods { display: flex; gap: 10px; margin-bottom: 12px; }
.method { flex: 1; background: #fff; border: 1px solid #f0f1f6; border-radius: 18px; padding: 14px; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; cursor: pointer; box-shadow: 0 4px 14px #0000000a; }
.m-ic { width: 40px; height: 40px; border-radius: 13px; background: #FCEFF1; color: #E79FAE; display: grid; place-items: center; }
.method b { font-family: 'Fredoka'; display: block; font-size: 15px; } .method small { color: #9aa0b4; font-size: 12px; }
.searchbar { display: flex; align-items: center; gap: 8px; background: #f4f6fb; border-radius: 15px; padding: 12px 14px; margin-bottom: 8px; }
.searchbar input { border: none; background: none; outline: none; flex: 1; font-family: 'Nunito'; font-size: 15px; color: #2A2D43; }
.evo-row { display: flex; justify-content: space-between; background: #ffffffcc; border-radius: 16px; padding: 12px 8px; margin-bottom: 14px; }
.evo { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #c3c8d6; font-size: 10px; }
.evo.done { color: #34BC97; } .evo small { color: #7a8099; }
.sect-t { font-family: 'Fredoka'; font-weight: 700; margin: 10px 0 8px; }
.swatches { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
.swatch { position: relative; background: #fff; border: 2px solid #eceff7; border-radius: 16px; padding: 8px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; min-width: 66px; }
.swatch.on { border-color: #E79FAE; }
.swatch small { font-size: 11px; color: #7a8099; font-weight: 700; }
.dot { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; }
.small-axo { background: #f4f6fb; overflow: hidden; }
.lock { position: absolute; top: 4px; right: 4px; background: #2A2D43; color: #fff; border-radius: 7px; width: 18px; height: 18px; display: grid; place-items: center; }
.win { color: #2c6f5b; font-weight: 700; font-size: 13px; margin-top: 6px; }
.tip-box { display: flex; align-items: flex-start; gap: 10px; background: linear-gradient(135deg,#FFF7E9,#FCEFF1); border: 1.5px solid #FFE3C2; border-radius: 16px; padding: 11px 13px; margin: 0 0 12px; }
.tip-icon { font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
.tip-text { font-family: 'Nunito'; font-size: 13px; line-height: 1.45; color: #6a5a3a; margin: 0; }
.tip-text b { color: #C2541F; }
.tip-box.glu { background: linear-gradient(135deg,#EAF3FF,#EEFBF6); border-color: #CFE6FF; }
.tip-box.glu .tip-text { color: #345b6e; } .tip-box.glu .tip-text b { color: #2b6f8f; }
.tip-box.musc { background: linear-gradient(135deg,#F1ECFF,#F8EEFF); border-color: #E2D6FF; }
.tip-box.musc .tip-text { color: #5a4a78; } .tip-box.musc .tip-text b { color: #6f3fae; }
.eat-pop { position: fixed; left: 50%; top: 42%; transform: translate(-50%,-50%); z-index: 120; pointer-events: none; animation: eatpop .45s cubic-bezier(.2,1.3,.5,1); }
.eat-bubble { position: relative; background: #fff; border-radius: 30px; padding: 8px 16px 2px; box-shadow: 0 14px 44px #00000030; }
@keyframes eatpop { 0% { transform: translate(-50%,-46%) scale(.55); opacity: 0 } 100% { transform: translate(-50%,-50%) scale(1); opacity: 1 } }
.streak-big { text-align: center; font-family: 'Fredoka'; font-weight: 800; font-size: 19px; color: #c2541f; background: #fff7f0; border: 2px solid #ffd9c2; border-radius: 18px; padding: 10px; margin: 4px auto 0; max-width: 220px; box-shadow: 0 4px 14px #ff7a3d22; }
.soft-opt { border-color: #FFD9A8 !important; background: #FFF6EA !important; color: #9a6a12 !important; }
.upsell { background: linear-gradient(135deg,#FFF7E6,#FFEFD6); }
.list-row { width: 100%; display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid #f0f1f6; border-radius: 16px; padding: 15px; margin-bottom: 10px; font-family: 'Nunito'; font-weight: 700; font-size: 15px; color: #2A2D43; cursor: pointer; }
.list-row svg { color: #E79FAE; }
.studio { margin-top: 16px; text-align: center; opacity: .9; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.overlay { position: absolute; top: 0; right: 0; bottom: 0; left: 0; background: #0006; display: flex; align-items: flex-end; justify-content: center; z-index: 40; animation: fade .2s; }
.overlay.celebrate { align-items: center; background: #0008; }
.sheet { background: #fff; width: 100%; border-radius: 26px 26px 0 0; padding: 22px 18px; position: relative; animation: up .28s cubic-bezier(.2,.8,.2,1); max-height: 88%; overflow-y: auto; color: #2A2D43; }
.sheet.tall { max-height: 92%; }
.sheet-x { position: absolute; top: 14px; right: 14px; background: #f2f4fa; border: none; width: 34px; height: 34px; border-radius: 11px; display: grid; place-items: center; cursor: pointer; color: #7a8099; }
.plan { display: flex; justify-content: space-between; align-items: center; border: 2px solid #eceff7; border-radius: 16px; padding: 14px; margin-bottom: 10px; }
.plan.best { border-color: #E79FAE; background: #FCEFF1; }
.plan b { font-family: 'Fredoka'; } .plan small { color: #7a8099; font-weight: 600; font-size: 12px; }
.perks { list-style: none; margin: 8px 0 14px; display: flex; flex-direction: column; gap: 9px; }
.perks li { display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 600; }
.coach-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.coach-q { background: #f6f7fb; border-radius: 14px; padding: 13px; margin-bottom: 9px; cursor: pointer; } .coach-q b { font-size: 14px; }
.mic-pulse { width: 76px; height: 76px; border-radius: 50%; background: linear-gradient(180deg,#F7CCD4,#E79FAE); display: grid; place-items: center; animation: pulse 1.2s infinite; }
.transcript { font-family: 'Fredoka'; font-weight: 600; font-size: 17px; text-align: center; margin: 4px 0 12px; color: #4a4f6a; }
.photo-frame { height: 130px; border: 2px dashed #d7dbe6; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; margin-bottom: 12px; }
.detect-h { font-family: 'Fredoka'; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.legal { max-height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 13.5px; line-height: 1.5; color: #4a4f6a; margin-bottom: 14px; }
.legal-note { background: #FFF4E5; color: #9a6a12; border-radius: 10px; padding: 8px 10px; font-weight: 700; font-size: 12px; }
.celebrate-card { background: #fff; border-radius: 26px; padding: 22px; width: 86%; max-width: 330px; text-align: center; animation: pop .4s cubic-bezier(.2,1.4,.4,1); box-shadow: 0 20px 60px #0004; color: #2A2D43; }
.kiss-stage { position: relative; display: grid; place-items: center; }
.flying-heart { position: absolute; top: 26%; left: 58%; animation: kiss 1.6s ease-out infinite; }
.reward-row { display: flex; gap: 8px; justify-content: center; margin: 6px 0 14px; flex-wrap: wrap; }
.reward { background: #FCEFF1; color: #E79FAE; font-weight: 800; font-size: 12px; padding: 7px 11px; border-radius: 20px; font-family: 'Fredoka'; }
.papel { position: absolute; top: 0; right: 0; bottom: 0; left: 0; overflow: hidden; pointer-events: none; }
.papel span { position: absolute; top: -20px; width: 11px; height: 14px; border-radius: 2px; animation: fall 2.6s linear infinite; opacity: .9; }
.toast { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: #2A2D43; color: #fff; padding: 11px 16px; border-radius: 14px; font-size: 13px; font-weight: 700; z-index: 60; animation: up .25s; box-shadow: 0 8px 24px #0004; max-width: 90%; text-align: center; }
.axo-bob { animation: bob 4s ease-in-out infinite; transform-origin: center; }
.axo-rub-l { animation: rubL 0.5s ease-in-out infinite; }
.axo-rub-r { animation: rubR 0.5s ease-in-out infinite; }
@keyframes rubL { 0%,100% { transform: rotate(-8deg) } 50% { transform: rotate(6deg) } }
@keyframes rubR { 0%,100% { transform: rotate(8deg) } 50% { transform: rotate(-6deg) } }
.loading { color:#7a8099; font-family:'Nunito'; font-weight:700; }
@keyframes bob { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-7px) } }
.rub { position: absolute; transform: translateX(-50%); font-size: 26px; pointer-events: none; animation: rub .5s ease-in-out infinite; }
.axo-rub2 { animation: rub2 .55s ease-in-out infinite; }
@keyframes rub2 { 0%,100% { transform: rotate(-7deg) } 50% { transform: rotate(9deg) } }
.think { position: absolute; transform: translateX(-50%); font-size: 24px; pointer-events: none; animation: floaty 1.8s ease-in-out infinite; }
@keyframes rub { 0%,100% { transform: translateX(-50%) rotate(-16deg) } 50% { transform: translateX(-50%) rotate(16deg) } }
@keyframes floaty { 0%,100% { transform: translateX(-50%) translateY(0) } 50% { transform: translateX(-50%) translateY(-6px) } }
@keyframes fade { from { opacity: 0 } }
@keyframes up { from { transform: translateY(40px); opacity: 0 } }
@keyframes pop { from { transform: scale(.7); opacity: 0 } }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 #e79fae55 } 50% { box-shadow: 0 0 0 16px #e79fae00 } }
@keyframes kiss { 0% { transform: translate(0,0) scale(.6); opacity: 0 } 30% { opacity: 1 } 100% { transform: translate(40px,-90px) scale(1.2); opacity: 0 } }
@keyframes fall { 0% { transform: translateY(0) rotate(0); opacity: 1 } 100% { transform: translateY(900px) rotate(360deg); opacity: .3 } }
@keyframes eggWiggle { 0%,100%{transform:rotate(0) scale(1)} 20%{transform:rotate(-13deg) scale(1.07)} 50%{transform:rotate(15deg) scale(1.11)} 80%{transform:rotate(-11deg) scale(1.08)} }
@keyframes eggHatch { 0%{transform:scale(1) rotate(0);opacity:1} 25%{transform:scale(1.18) rotate(-14deg)} 50%{transform:scale(1.24) rotate(16deg)} 75%{transform:scale(1.2) rotate(-10deg)} 100%{transform:scale(0) rotate(22deg);opacity:0} }
.egg-wiggle { animation: eggWiggle 0.35s ease-in-out infinite; transform-origin: center bottom; }
.egg-hatch { animation: eggHatch 0.9s cubic-bezier(.4,0,.2,1) forwards; transform-origin: center bottom; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

if ('serviceWorker' in navigator) {
  var swCode = [
    "const CACHE = 'axolofit-v1';",
    "self.addEventListener('install', e => { self.skipWaiting(); });",
    "self.addEventListener('activate', e => {",
    "  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))));",
    "  self.clients.claim();",
    "});",
    "self.addEventListener('fetch', e => {",
    "  if (e.request.url.includes('supabase') || e.request.url.includes('googleapis')) return;",

    "    caches.match(e.request).then(r => r || fetch(e.request).then(res => {",

    "        caches.open(CACHE).then(c => c.put(e.request, clone));",
    "      }",
    "      return res;",
    "    }).catch(() => caches.match(e.request)))",
    "  );",
    "});"
